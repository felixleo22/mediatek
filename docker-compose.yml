version: '3'

networks:
  laravel:

services:
  nginx:
    image: nginx:1.21
    container_name: nginx
    ports:
      - 8080:80
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mariadb
    networks: 
      - laravel

  mariadb:
    image: mariadb:10.7
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: database
      MYSQL_USER: admin
      MYSQL_PASSWORD: changeme
    volumes:
     - ${PWD}/mariadb:/var/lib/mysql
    networks: 
      - laravel
    ports:
      - 3306:3306

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php
    volumes:
      - ./src:/var/www/html
    ports:
      - 9000:9000
    networks:
      - laravel

